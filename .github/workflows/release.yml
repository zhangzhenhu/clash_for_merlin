name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set release version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release packages
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          
          mkdir -p release

          # 扫描 binaries 目录下的所有压缩文件
          for binary in binaries/*.gz; do
            if [ -f "$binary" ]; then
              binary_name=$(basename "$binary")
              
              # 创建临时目录
              TEMP_DIR="release/clash_for_merlin_${binary_name%.gz}"
              mkdir -p "${TEMP_DIR}"

              # 复制公共文件
              cp init.sh "${TEMP_DIR}/"
              cp uninstall.sh "${TEMP_DIR}/"
              cp clash_service.sh "${TEMP_DIR}/"
              cp service-start.sh "${TEMP_DIR}/"
              cp clashUI.asp "${TEMP_DIR}/"
              cp -r configs "${TEMP_DIR}/"
              cp -r dashboard "${TEMP_DIR}/"

              # 创建 binaries 目录并复制压缩文件
              mkdir -p "${TEMP_DIR}/binaries"
              cp "$binary" "${TEMP_DIR}/binaries/"

              # 打包
              cd release
              tar -czvf "clash_for_merlin_${binary_name}" "clash_for_merlin_${binary_name%.gz}"

              # 清理临时目录
              rm -rf "clash_for_merlin_${binary_name%.gz}"
            fi
          done

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: release/clash_for_merlin_*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set release version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-packages
          path: release
          merge-multiple: true

      - name: Prepare release files
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          mkdir -p release/final

          # 复制安装脚本
          cp install.sh release/final/
          cp uninstall.sh release/final/
          chmod +x release/final/install.sh release/final/uninstall.sh

          # 移动所有平台包到 final 目录
          for f in release/clash_for_merlin_*; do
            if [ -f "$f" ]; then
              cp "$f" release/final/
            fi
          done

          ls -la release/final/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/final/*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
