name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set release version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release packages
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          
          mkdir -p release

          # 扫描 binaries 目录下的所有压缩文件
          for binary in binaries/*.gz; do
            if [ -f "$binary" ]; then
              binary_name=$(basename "$binary")
              
              # 创建临时目录 (直接用 clash_for_merlin 名称)
              TEMP_DIR="release/clash_for_merlin"
              rm -rf "${TEMP_DIR}"
              mkdir -p "${TEMP_DIR}"

              # 复制公共文件
              cp init.sh "${TEMP_DIR}/"
              cp uninstall.sh "${TEMP_DIR}/"
              cp clash_service.sh "${TEMP_DIR}/"
              cp service-start.sh "${TEMP_DIR}/"
              cp clashUI.asp "${TEMP_DIR}/"
              cp -r configs "${TEMP_DIR}/"
              cp -r dashboard "${TEMP_DIR}/"

              # 创建 binaries 目录并复制压缩文件
              mkdir -p "${TEMP_DIR}/binaries"
              cp "$binary" "${TEMP_DIR}/binaries/"

              # 打包到 release 目录
              (cd release && tar -czvf "../release/clash_for_merlin_${binary_name%.gz}.tar.gz" "clash_for_merlin")

              # 清理临时目录
              rm -rf release/clash_for_merlin
              
              echo "Created: clash_for_merlin_${binary_name%.gz}.tar.gz"
            fi
          done
          
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.tar.gz
            install.sh
            uninstall.sh
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
