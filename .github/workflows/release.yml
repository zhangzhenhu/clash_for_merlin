name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set release version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release archive
        run: |
          mkdir -p release
          tar -czvf release/clash_for_merlin.tar.gz \
            init.sh \
            uninstall.sh \
            clash_service.sh \
            clashUI.asp \
            configs/ \
            dashboard/ \
            bin/

      - name: Copy install scripts
        run: |
          mkdir -p release
          cp install.sh release/install.sh
          cp uninstall.sh release/uninstall.sh
          chmod +x release/install.sh release/uninstall.sh

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/clash_for_merlin.tar.gz
            release/install.sh
            release/uninstall.sh
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
